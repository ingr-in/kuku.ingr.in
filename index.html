<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<style>
  body {
    background-color: whitesmoke;
    color: deeppink;
  }
  /* Default में केवल 7px ऊंचाई दिखे */
  .header {
    cursor: pointer;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    /* Default में सिर्फ 7px दिखे */
    background: rgba(0, 0, 0, 0.8);
    /* हल्का Transparent */
    color: deeppink;
    transition: height 0.3s ease-in-out;
    overflow: hidden;
    z-index: 9;
  }

  /* Hover करने पर पूरा Header दिखे */
  .header:hover {
    height: 60px;
    /* Hover करने पर पूरी Height दिखे */
  }
  .color {
    color: deeppink;
  }

</style>
<body>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <header class="header">
    <!-- Navigation Bar -->
    <div class="navbar font-s1 color">
      <a href="/index">Home</a>
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/contact">Contact</a>
      <a href="/login.html">login</a>
      <a href=" /singup.html">Contact</a>
    </div>
  </header>

  <div class="main">
    <style>
      /* Nav Bar Styling */
      /*body { font-family: Arial, sans-serif; margin: 0; padding: 0; }*/
      body {
        cursor: default;
        width: 99%;
        height: 99%;
        margin-right: 650px;
        text-align: center;
        padding: 0;
        margin: 0;
        padding-left: 2rem;
        padding-right: 2rem;
        margin-left: 2rem;
        margin-right: 2rem;
        font-size: 22px;
        color: magenta;
        background-color: whitesmoke;
        background-image: url('/img/IMG-20250401-WA0002.jpg');
        background-size: cover;
        /* इमेज को स्क्रीन पर पूरी तरह फैलाएं */
        background-position: center;
        /* सेंटर में रखें */
        background-repeat: no-repeat;
        /* दोहराएं नहीं */
      }

      * {
        color: deeppink;
      }
      .navbar {
        background-color: #333;
        overflow: hidden;
      }
      .navbar a {
        float: left;
        display: block;
        color: white;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
      }
      .navbar a:hover {
        background-color: #ddd;
        color: black;
      }
      .container {
        text-align: center;
        padding: 50px;
      }
      .img {
        columns: 4;
      }
      img {
        align-content: center;
        height: 99%;
        width: 99%;
      }
      h1,p {
        cursor: grab;
      }
:root {
        --body-background-color: whitesmoke;
        --body-font-color: DeepPink;
        --input-background-color: greenyellow;
        --input-font-color: magenta;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--body-background-color);
        color: var(--body-font-color);
        font-family: Arial, sans-serif;

      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      #app {
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      input, textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: var(--input-background-color);
        color: var(--input-font-color);
      }

      button {
        background-color: #4CAF50;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        width: 100%;
      }

      button:hover {
        background-color: #45a049;
      }
      .font-s1 {
        font-family: 'Brush Script MT', cursive;
      }
      .bold {
        font-weight: bold;
      }
      .font-it {
        font-style: italic;
      }
      .bc1 {
        background-color: greenyellow;
      }
    </style>

    <main>
      <div class="container font-s1">
        <h1>Welcome to My Website</h1>
        <p>
          This is a simple home page with a navigation bar.
          <h1><a href="#gallery">gallery</a></h1>
        </p>
      </div>
      <div class="font-it bold">
        <span class="font-it"> <a href="../index.html" style="cursor: pointer;">&hearts;ꈜꌈꌅꌈꌈ &hearts;🅘🅝🅖🅡.🅘🅝</a> </span>
      </div>
    </main>
  </div>
  <footer id="footer" class="footer fonts-1 bold font-it bc1" style="background: #333; color: #fff; text-align: center; padding: 20px; position: fixed; bottom: 0; width: 100%; cursor:pointer;">
    <style>
      /* Default में केवल 7px ऊंचाई दिखे */
      footer {
        cursor: pointer;
        position: fixed;
        bottom: 2;
        left: 0;
        width: 100%;
        height: 25px;
        /* Default में सिर्फ 7px दिखे */
        background: rgba(0, 0, 0, 0.8);
        /* हल्का Transparent */
        transition: height 0.3s ease-in-out;
        overflow: hidden;
        z-index: 9999;
      }

      /* Hover करने पर पूरा Header दिखे */
      footer:hover {
        height: 12rem;
        /* Hover करने पर पूरी Height दिखे */
        cursor: pointer;
      }

    </style>
    <p>
      <i class="fa-brands fa-square-bluesky" style="color: #63E6BE; "style="cursor: pointer;">&hearts;ingr.in</i>
    </p>
    <br>
    <nav>

        <i class="fas fa-info-circle"></i> About
      </a>
      <a href="/contact" style="color: inherit; margin: 0 10px; text-decoration: none;">
        <i class="fas fa-envelope"></i> Contact
      </a>
      <a href="/privacy" style="color: inherit; margin: 0 10px; text-decoration: none;">

      </a>
      <a href="/terms" style="color: inherit; margin: 0 10px; text-decoration: none;">

    <div style="margin-top: 10px;">
      <a href="#" style="color: inherit; margin: 0 10px;">

      <a href="#" style="color: inherit; margin: 0 10px;">

</body>
</html>
